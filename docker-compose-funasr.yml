version: '3.8'

# FunASR 实时语音听写服务
# 部署文档: docs/FUNASR_DEPLOYMENT.md
# 默认端口: 10096 (宿主机) -> 10095 (容器)
# 启动命令: ./bin/funasr.sh start

services:
  funasr:
    # 官方 arm64 镜像（Mac Apple Silicon / Linux arm64）
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.13
    container_name: xiaozhi-funasr
    restart: unless-stopped
    platform: linux/arm64
    ports:
      - "10096:10095"   # WebSocket 端口
    volumes:
      - ./funasr-runtime-resources/models:/workspace/models
      - ./funasr-runtime-resources/hotwords.txt:/workspace/models/hotwords.txt
      - ./bin/docker-entrypoint-funasr.sh:/entrypoint.sh
    environment:
      - TZ=Asia/Shanghai
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    networks:
      - xiaozhi-funasr-network

networks:
  xiaozhi-funasr-network:
    name: xiaozhi-funasr-network
    driver: bridge

