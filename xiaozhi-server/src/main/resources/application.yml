# ============================================================
# 通用配置（所有环境共享）
# ============================================================

server:
  port: 8091
  tomcat:
    mbeanregistry:
      enabled: true  # 启用 Tomcat MBean，自动获得 tomcat_global_sent/received_bytes_total

# ============================================================
# MyBatis 配置
# ============================================================
mybatis:
  mapper-locations: classpath*:mapper/*.xml,classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false

# ============================================================
# 数据源配置
# ============================================================
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 300000
      pool-name: DatebookHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 60000
      keepalive-time: 30000
      register-mbeans: true

  # Redis 缓存配置
  cache:
    type: redis

  # Flyway 数据库版本管理（临时禁用以修复 V11 问题）
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: false

  data:
    redis:
      # Redis 服务器地址（Spring Data Redis 和 Redisson 自动共享此配置）
      host: localhost
      port: 6379
      database: 0
      # Lettuce 连接池配置（默认不开池，所有线程共享单连接，高并发下会成为瓶颈）
      lettuce:
        pool:
          max-active: 16    # 最大活跃连接数
          max-idle: 8       # 最大空闲连接数
          min-idle: 2       # 最小空闲连接数
          max-wait: 3s      # 获取连接最大等待时间
      # Redisson 高级配置文件（用于分布式锁、布隆过滤器等高级功能）
      redisson:
        config: classpath:redisson-config.yml

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  # JMX 配置
  jmx:
    enabled: false

  # 虚拟线程
  threads:
    virtual:
      enabled: true

  # 静态资源配置
  web:
    resources:
      add-mappings: true

  # 激活的配置文件（默认为开发环境）
  profiles:
    active: dev

  # MCP 客户端配置
  ai:
    mcp:
      client:
        name: XiaoZhi-MCP-Client
        version: 1.0.0
        request-timeout: 60s

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    root: WARN
    com.xiaozhi: DEBUG
    com.xiaozhi.server.web.chat: DEBUG
    com.xiaozhi.ai.llm: TRACE
    org.springframework.ai.openai: TRACE
    org.springframework.web.reactive.function.client: TRACE
    org.springframework.web.reactive.function.client.ExchangeFunctions: TRACE
    reactor.netty.http.client: DEBUG
    io.github.imfangs.dify.client.impl.StreamEventDispatcher: ERROR

# ============================================================
# 小智扩展配置
# ============================================================
xiaozhi:
  runtime:
    # 生产环境建议改成绝对路径，避免模型目录和原生库目录依赖启动工作目录
    native-lib-dir: lib
    vosk-model-dir: models/vosk-model
    tts-models-dir: models/tts
  vad:
    model:
      path: models/silero_vad.onnx
  check:
    inactive:
      session: true

# ============================================================
# SpringDoc OpenAPI 配置
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    url: /v3/api-docs

# ============================================================
# Sa-Token 认证框架配置
# ============================================================
sa-token:
  # Token名称 (同时也是cookie名称)
  token-name: Authorization

  # Token有效期 (单位:秒) 30天 = 2592000秒, -1表示永不过期
  timeout: 2592000

  # Token最低活跃频率 (单位:秒), 如果token超过此时间没有访问系统就会被冻结, -1 表示不限制
  active-timeout: -1

  # 是否允许同一账号多地同时登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true

  # 在多人登录同一账号时,是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false

  # Token风格 (uuid、simple-uuid、random-32、random-64、random-128、tik)
  token-style: uuid

  # 是否输出操作日志
  is-log: false

  # 是否从cookie中读取token
  is-read-cookie: true

  # 是否从header中读取token
  is-read-header: true

  # token前缀, 例如填写 Bearer 之后客户端应该发送: Bearer {token}
  token-prefix: Bearer

  # JWT秘钥 (使用JWT Simple模式时必须配置，至少32位)
  jwt-secret-key: xiaozhi-esp32-server-java-jwt-secret-key

